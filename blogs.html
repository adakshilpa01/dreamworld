<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}
body{font-family:'Poppins',sans-serif;background:#0b0b0b;color:#fff;margin:0;overflow-x: hidden;}
.top-header {
  background: #000; /* pure black */
  color: #d4af37; /* gold text */
  font-size: 14px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(212, 175, 55, 0.3);
}

.top-header .container {
  width: 90%;
  margin: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LEFT */
.top-left span {
  margin-right: 25px;
  color: #D4AF37;
}

.top-left i {
  margin-right: 6px;
  color: #d4af37; /* brighter gold for icons */
}

/* RIGHT ICONS */
.top-right a {
  color: #D4AF37;
  margin-left: 15px;
  font-size: 16px;
  transition: all 0.3s ease;
}

/* HOVER EFFECT 🔥 */
.top-right a:hover {
  color: #d4af37;
  transform: translateY(-2px);
}

/* MOBILE */
@media (max-width: 768px) {
  .top-header .container {
    flex-direction: column;
    gap: 5px;
    text-align: center;
  }
}
/* Navbar */
.navbar{background:#000;padding:15px 0}
.navbar-brand{font-weight:bold;font-size:24px;color:#d4af37 !important}
.nav-link{color:#fff !important;margin:0 10px}
.nav-link:hover{color:#D4AF37 !important}
.btn-nav{background:#D4AF37;color:#0b0b0b;border:none;padding:8px 18px;border-radius:6px}
.dropdown:hover .dropdown-menu {display: block;}
.logo
{
  height: 70px;
}
/* Dropdown box */
.dropdown-menu {
  background: #000;   /* dark blue */
  border-radius: 10px;
  padding: 10px 0;
  border: none;
  margin-top: 10px;
  min-width: 200px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* Items */
.dropdown-menu .dropdown-item {
  color: #fff;
  padding: 10px 20px;
  transition: 0.3s;
}

/* Hover effect */
.dropdown-menu .dropdown-item:hover {
  background: transparent;
  color: #d4af37;   /* yellow */
  transform: translateX(5px);
}

/* Hover open */
.dropdown:hover .dropdown-menu {
  display: block;
}


.nav-link {
  color: white !important;
  padding: 8px 16px;
  border-radius: 25px;
  transition: 0.3s;
}

/* Hover */
.nav-link:hover {
  background: #d4af37;
  color: black !important;
}

/* Active (clicked) */
.nav-link.active {
  background: #d4af37;
  color: black !important;
}

/* HERO */
.blog-hero{
  height:40vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
  url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
  background-size:cover;
}

.blog-hero h1{
  color:#d4af37;
  font-size:42px;
}

/* TOP BAR */
.blog-top{
  padding:30px 8%;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:15px;
}

/* SEARCH */
.search-box{
  padding:10px 15px;
  width:250px;
  border:none;
  outline:none;
  background:#111;
  color:#fff;
  border:1px solid #d4af37;
}

/* FILTER */
.filters button{
  padding:8px 15px;
  margin-right:10px;
  border:none;
  cursor:pointer;
  background:#111;
  color:#d4af37;
  border:1px solid #d4af37;
  transition:0.3s;
}

.filters button:hover,
.filters button.active{
  background:#d4af37;
  color:#000;
}

/* GRID */
.blog-container{
  padding:40px 8%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

/* CARD */
.blog-card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.4s;
  display:none;
}

.blog-card.show{
  display:block;
}

.blog-card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 0 20px rgba(212,175,55,0.4);
}

.blog-card img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.4s;
}

.blog-card:hover img{
  transform:scale(1.1);
}

.blog-content{
  padding:15px;
}

.blog-content h3{
  color:#d4af37;
}

.blog-content p{
  font-size:14px;
  color:#ccc;
  margin:10px 0;
}

.read-more{
  text-decoration:none;
  border:1px solid #d4af37;
  padding:6px 15px;
  color:#d4af37;
  display:inline-block;
}

.read-more:hover{
  background:#d4af37;
  color:#000;
}

/* LOAD MORE */
.load-more{
  text-align:center;
  margin:30px;
}

.load-more button{
  padding:10px 25px;
  border:none;
  background:#d4af37;
  color:#000;
  cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
  .blog-top{
    flex-direction:column;
  }
}

</style>
</head>
